<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Instant Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>Instant Landing Page</h1>
      <p class="tagline">Describe your idea. Get a live landing page in 60 seconds.</p>

      <textarea id="prompt" rows="6" placeholder="e.g. A subscription box for rare houseplants, aimed at first-time plant owners"></textarea>

      <button id="generate">Generate</button>
      <p id="status" class="status"></p>
    </section>

    <section class="preview-wrap">
      <iframe id="preview" title="Landing page preview"></iframe>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
